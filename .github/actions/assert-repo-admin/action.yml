name: Assert repository admin
description: Fail the job unless the triggering actor has admin permission on the repository.

runs:
  using: composite
  steps:
    - name: Verify repository admin permission
      uses: actions/github-script@v7
      with:
        script: |
          const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
            owner: context.repo.owner,
            repo: context.repo.repo,
            username: context.actor,
          });

          if (data.permission !== 'admin') {
            core.setFailed(
              `This workflow is restricted to repository admins. ` +
                `${context.actor} has "${data.permission}" permission.`,
            );
            return;
          }

          core.info(`Authorized admin: ${context.actor}`);
