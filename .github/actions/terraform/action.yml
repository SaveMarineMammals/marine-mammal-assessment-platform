name: Terraform
description: Initialize Terraform and run plan or apply for an MMAP environment.

inputs:
  working-directory:
    description: Path to the Terraform environment root
    required: true
  command:
    description: plan or apply
    required: true
  aws-role-arn:
    description: IAM role ARN to assume via OIDC
    required: true
  aws-region:
    description: AWS region
    required: false
    default: us-east-1
  state-bucket:
    description: S3 bucket for remote state
    required: true
  state-key:
    description: S3 object key for this environment state file
    required: true
  lock-table:
    description: DynamoDB table for state locking
    required: true
  var-file:
    description: Optional terraform.tfvars path relative to working-directory
    required: false
    default: terraform.tfvars

outputs:
  destroy_detected:
    description: Whether the plan includes resource deletions
    value: ${{ steps.plan.outputs.destroy_detected }}

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm

    - name: Install dependencies
      shell: pwsh
      run: pnpm install --frozen-lockfile

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.8

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Terraform init
      shell: pwsh
      run: |
        pnpm exec tsx scripts/terraform-init.ts `
          "${{ inputs.working-directory }}" `
          "${{ inputs.state-bucket }}" `
          "${{ inputs.state-key }}" `
          "${{ inputs.aws-region }}" `
          "${{ inputs.lock-table }}"

    - name: Terraform plan
      if: inputs.command == 'plan'
      id: plan
      shell: pwsh
      run: |
        pnpm exec tsx scripts/terraform-plan.ts "${{ inputs.working-directory }}" "${{ inputs.var-file }}"

    - name: Terraform apply
      if: inputs.command == 'apply'
      shell: pwsh
      run: |
        pnpm exec tsx scripts/terraform-apply.ts "${{ inputs.working-directory }}" "${{ inputs.var-file }}"
