name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, format & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  integration:
    name: API & field sync integration
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: mmap
          POSTGRES_PASSWORD: mmap
          POSTGRES_DB: mmap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mmap -d mmap"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://mmap:mmap@localhost:5432/mmap
      API_ADMIN_TOKEN: dev-admin-token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages and API
        run: pnpm --filter @mmap/schema build && pnpm --filter @mmap/geo-time build && pnpm --filter @mmap/api build

      - name: Integration tests
        run: pnpm test:integration -- --database-url postgresql://mmap:mmap@localhost:5432/mmap
