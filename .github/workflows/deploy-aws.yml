# Deploy application artifacts to AWS (API image, static sites).
#
# Requires Terraform infrastructure applied first. GitHub environment secrets:
# - AWS_DEPLOY_ROLE_ARN, DATABASE_SECRET_ARN (RDS-managed secret ARN from terraform output)
# - WEB_STATIC_BUCKET, FIELD_STATIC_BUCKET, WEB_CLOUDFRONT_ID, FIELD_CLOUDFRONT_ID

name: Deploy AWS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: mmap-api

jobs:
  deploy:
    name: Deploy to ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Build static sites
        shell: pwsh
        run: |
          pnpm --filter @mmap/web build
          pnpm --filter @mmap/field build
        env:
          VITE_DOCS_URL: https://www.example.org/docs/manatee-v1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync web static assets to S3
        shell: pwsh
        run: aws s3 sync apps/web/dist/ "s3://${{ secrets.WEB_STATIC_BUCKET }}/" --delete

      - name: Sync field static assets to S3
        shell: pwsh
        run: aws s3 sync apps/field/dist/ "s3://${{ secrets.FIELD_STATIC_BUCKET }}/" --delete

      - name: Invalidate CloudFront caches
        shell: pwsh
        run: |
          aws cloudfront create-invalidation --distribution-id "${{ secrets.WEB_CLOUDFRONT_ID }}" --paths "/*"
          aws cloudfront create-invalidation --distribution-id "${{ secrets.FIELD_CLOUDFRONT_ID }}" --paths "/*"

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        shell: pwsh
        env:
          IMAGE_TAG: ${{ github.ref_name }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -f apps/api/Dockerfile -t "$env:ECR_REGISTRY/$env:ECR_REPOSITORY:$env:IMAGE_TAG" .
          docker push "$env:ECR_REGISTRY/$env:ECR_REPOSITORY:$env:IMAGE_TAG"

      - name: Run database migrations
        shell: pwsh
        env:
          DATABASE_SECRET_ARN: ${{ secrets.DATABASE_SECRET_ARN }}
        run: |
          $secret = aws secretsmanager get-secret-value `
            --secret-id $env:DATABASE_SECRET_ARN `
            --query SecretString `
            --output text
          $env:DATABASE_URL = $secret
          pnpm --filter @mmap/api db:migrate

      - name: Deploy API to App Runner
        shell: pwsh
        env:
          IMAGE_TAG: ${{ github.ref_name }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          Write-Host "TODO: wire App Runner update-service + start-deployment using Terraform outputs"
