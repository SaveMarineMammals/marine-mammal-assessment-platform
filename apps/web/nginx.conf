server {

    listen 80;

    server_name _;



    root /usr/share/nginx/html;

    index index.html;



    gzip on;

    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;



    location /v1/ {

        proxy_pass http://api:3001;

        proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

    }



    location /openapi {

        rewrite ^/openapi(.*)$ /docs$1 break;

        proxy_pass http://api:3001;

        proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

    }



    # Stale Vite PWA dev service workers (from local field dev on this port) hijack

    # navigation and serve a blank field shell. 410 tells the browser to unregister.

    location ~ ^/(dev-sw\.js|sw\.js)(\?.*)?$ {

        add_header Clear-Site-Data "\"cache\", \"storage\"" always;

        return 410;

    }



    # Vite dev paths must never fall back to index.html (causes MIME type errors).

    location ^~ /src/ {

        return 404;

    }



    location ^~ /@vite/ {

        return 404;

    }



    location ^~ /@react-refresh {

        return 404;

    }



    location ^~ /@fs/ {

        return 404;

    }



    location /assets/ {

        add_header Cache-Control "public, max-age=31536000, immutable";

        try_files $uri =404;

    }



    location = /index.html {

        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;

        add_header Pragma "no-cache" always;

        add_header Expires "0" always;

        etag off;

    }



    location / {

        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;

        add_header Pragma "no-cache" always;

        add_header Expires "0" always;

        etag off;

    }

}


